<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ShadowCrypt</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>🔐 ShadowCrypt</h1>

    <p class="subtitle">
        Caesar Cipher Encryption System
    </p>

    <!-- USER MESSAGE -->
    <textarea
        id="message"
        placeholder="Enter Your Secret Message">
    </textarea>

    <!-- USER KEY -->
    <input
        type="number"
        id="shift"
        placeholder="Enter Encryption Key">

    <!-- BUTTONS -->
    <div class="buttons">

        <button onclick="encryptMessage()">
            Encrypt
        </button>

        <button onclick="decryptMessage()">
            Decrypt
        </button>

    </div>

    <!-- ENCRYPTED OUTPUT -->
    <h2>Encrypted Message</h2>

    <textarea id="encryptedResult" readonly></textarea>

    <!-- DECRYPTED OUTPUT -->
    <h2>Decrypted Message</h2>

    <textarea id="decryptedResult" readonly></textarea>

</div>

<script>

function encrypt(text, shift) {

    let result = "";

    for (let char of text) {

        if (char.match(/[a-z]/i)) {

            let code = char.charCodeAt(0);

            // LOWERCASE
            if (char >= 'a' && char <= 'z') {

                result += String.fromCharCode(
                    ((code - 97 + shift) % 26 + 26) % 26 + 97
                );
            }

            // UPPERCASE
            else {

                result += String.fromCharCode(
                    ((code - 65 + shift) % 26 + 26) % 26 + 65
                );
            }

        }

        else {

            result += char;
        }
    }

    return result;
}

function decrypt(text, shift) {

    return encrypt(text, -shift);
}

function encryptMessage() {

    let message =
        document.getElementById("message").value;

    let shift =
        parseInt(document.getElementById("shift").value);

    let encrypted =
        encrypt(message, shift);

    document.getElementById("encryptedResult").value =
        encrypted;
}

function decryptMessage() {

    let encryptedText =
        document.getElementById("encryptedResult").value;

    let shift =
        parseInt(document.getElementById("shift").value);

    let decrypted =
        decrypt(encryptedText, shift);

    document.getElementById("decryptedResult").value =
        decrypted;
}

</script>

</body>
</html>
